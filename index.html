<!-- INDEX ACS OCC — Image Background + Real Buttons -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Aviation Capital Simulator — ACS OCC</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" sizes="16x16" href="acs_logo_16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="acs_logo_32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="acs_logo_64.png">
  <link rel="apple-touch-icon" href="acs_logo_180.png">
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #020713;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .acs-index {
      position: relative;
      width: 100%;
      max-width: 1536px;
      min-height: 100vh;
      margin: 0 auto;
      background: #020713;
    }

    .acs-bg {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .acs-click-zone {
      position: absolute;
      display: block;
      z-index: 20;
      text-decoration: none;
      border-radius: 14px;
      outline: none;
    }

    .acs-click-zone:focus-visible {
      outline: 2px solid rgba(255, 202, 99, 0.9);
      outline-offset: 4px;
    }

    .register-zone {
      left: 10.0%;
      top: 54.2%;
      width: 25.2%;
      height: 10.5%;
    }

    .login-zone {
      left: 36.8%;
      top: 54.2%;
      width: 26.4%;
      height: 10.5%;
    }

    .support-zone {
      left: 64.8%;
      top: 54.2%;
      width: 25.2%;
      height: 10.5%;
    }

    @media (max-width: 900px) {
      body {
        display: block;
      }

      .acs-index {
        min-width: 900px;
      }
    }
  </style>
</head>

<body>
  <main class="acs-index">

    <img
      src="index_acs_occ_bg.jpg"
      alt="Aviation Capital Simulator ACS OCC"
      class="acs-bg"
    >

    <a
      class="acs-click-zone register-zone"
      href="register.html"
      aria-label="Register">
    </a>

    <a
      class="acs-click-zone login-zone"
      href="login.html"
      aria-label="Login">
    </a>

    <a
      class="acs-click-zone support-zone"
      href="support.html"
      aria-label="Support">
    </a>

  </main>
</body>
</html>
