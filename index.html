<!-- INDEX ACS OCC — Image Background + Real Buttons -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Aviation Capital Simulator</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" sizes="16x16" href="acs_logo_16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="acs_logo_32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="acs_logo_64.png">
  <link rel="apple-touch-icon" href="acs_logo_180.png">
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #020713;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .acs-index {
      position: relative;
      width: 100%;
      max-width: 1536px;
      min-height: 100vh;
      margin: 0 auto;
      background: #020713;
    }

    .acs-bg {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .acs-click-zone {
      position: absolute;
      display: block;
      z-index: 20;
      text-decoration: none;
      border-radius: 14px;
      outline: none;
    }

    .acs-click-zone:focus-visible {
      outline: 2px solid rgba(255, 202, 99, 0.9);
      outline-offset: 4px;
    }

    .register-zone {
      left: 10.0%;
      top: 54.2%;
      width: 25.2%;
      height: 10.5%;
    }

    .login-zone {
      left: 36.8%;
      top: 54.2%;
      width: 26.4%;
      height: 10.5%;
    }

    .support-zone {
      left: 64.8%;
      top: 54.2%;
      width: 25.2%;
      height: 10.5%;
    }

    @media (max-width: 900px) {
      body {
        display: block;
      }

      .acs-index {
        min-width: 900px;
      }
    }

/* ============================================================
   ACS OCC GLOBAL RESPONSIVE SYSTEM
   iPad • Tablets • iPhone • Android
   ============================================================ */


/* ============================================================
   1. GLOBAL RESPONSIVE BASE
   ============================================================ */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

img,
svg,
video,
canvas {
  max-width: 100%;
}

input,
select,
textarea,
button {
  max-width: 100%;
  font: inherit;
}

.acs-main {
  width: 100%;
  max-width: 100%;
}


/* ============================================================
   2. RESPONSIVE TABLE CONTAINERS
   No obliga a todas las tablas a medir 680px
   ============================================================ */

.acs-table-wrapper,
.table-wrapper,
.table-responsive {
  width: 100%;
  max-width: 100%;
  overflow-x: auto;
  overflow-y: hidden;

  -webkit-overflow-scrolling: touch;
}


/* ============================================================
   3. RESPONSIVE MODALS AND PANELS
   ============================================================ */

.modal,
.acs-modal,
.dialog {
  max-width: calc(100vw - 32px);
}


/* ============================================================
   4. iPAD PORTRAIT / MEDIUM TABLETS
   769px — 900px
   Conserva el comportamiento que ya funciona
   ============================================================ */

@media (max-width: 900px) and (min-width: 769px) {

  /* OCC header */

  .acs-header {
    flex-wrap: wrap;
    row-gap: 10px;
  }

  .acs-left {
    order: 1;
    flex: 1 1 auto;
    min-width: 0;
  }

  .acs-right {
    order: 2;
    flex: 0 0 auto;
  }

  .acs-nav {
    order: 3;
    flex: 0 0 100%;

    width: 100%;

    justify-content: center;
    gap: 1.6rem;
  }

  .acs-main {
    padding-top: 145px;
  }


  /* Login / public pages header */

  .acs-logo {
    min-width: 0;
  }

  .acs-nav-buttons {
    flex-wrap: nowrap;
    gap: 0.65rem;
  }


  /* Global footer */

  .acs-footer {
    padding: 16px 14px;

    font-size: 0.78rem;

    white-space: nowrap;
    overflow-x: auto;
    overflow-y: hidden;

    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .acs-footer::-webkit-scrollbar {
    display: none;
  }

  .acs-footer-separator {
    margin: 0 6px;
  }
}


/* ============================================================
   5. MOBILE + SMALL TABLETS
   iPhone • Android • Tablets ≤ 768px
   ============================================================ */

@media (max-width: 768px) {

  /* Header base */

  .acs-header {
    flex-wrap: wrap;

    row-gap: 10px;

    padding-left: 14px;
    padding-right: 14px;
  }


  /* OCC header structure */

  .acs-left {
    order: 1;

    flex: 1 1 auto;
    min-width: 0;
  }

  .acs-right {
    order: 2;

    flex: 0 0 auto;
  }

  .acs-nav {
    order: 3;

    flex: 0 0 100%;

    width: 100%;

    justify-content: flex-start;
    gap: 10px;

    overflow-x: auto;
    overflow-y: hidden;

    padding-bottom: 4px;

    white-space: nowrap;

    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .acs-nav::-webkit-scrollbar {
    display: none;
  }

  .acs-nav a,
  .acs-nav button {
    flex: 0 0 auto;
    white-space: nowrap;
  }


  /* Login / public pages header structure */

  .acs-logo {
    min-width: 0;
    max-width: 100%;
  }

  .acs-logo img {
    flex: 0 0 auto;
  }

  .acs-logo h1 {
    max-width: 100%;
    white-space: nowrap;
  }

  .acs-nav-buttons {
    width: 100%;

    display: flex;
    justify-content: center;

    gap: 8px;

    overflow-x: auto;
    overflow-y: hidden;

    padding-bottom: 3px;

    white-space: nowrap;

    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .acs-nav-buttons::-webkit-scrollbar {
    display: none;
  }

  .acs-nav-buttons a,
  .acs-nav-buttons button {
    flex: 0 0 auto;
    white-space: nowrap;
  }


  /* Main content */

  .acs-main {
    padding-top: 145px;
    padding-left: 14px;
    padding-right: 14px;
  }


  /* Tables */

  .acs-table-wrapper,
  .table-wrapper,
  .table-responsive {
    width: 100%;
    max-width: 100%;

    overflow-x: auto;

    -webkit-overflow-scrolling: touch;
  }


  /* Modals */

  .modal,
  .acs-modal,
  .dialog {
    width: calc(100vw - 28px);
    max-width: calc(100vw - 28px);

    margin-left: auto;
    margin-right: auto;
  }


  /* Global footer */

  .acs-footer {
    width: 100%;

    padding: 15px 12px;

    font-size: 0.74rem;

    white-space: nowrap;

    overflow-x: auto;
    overflow-y: hidden;

    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .acs-footer::-webkit-scrollbar {
    display: none;
  }

  .acs-footer-separator {
    margin: 0 5px;
  }
}


/* ============================================================
   6. COMPACT MOBILE
   Small iPhone • Small Android ≤ 480px
   ============================================================ */

@media (max-width: 480px) {

  .acs-header {
    padding-left: 10px;
    padding-right: 10px;
  }


  /* ACS logo and corporate title */

  .acs-logo {
    max-width: 100%;
  }

  .acs-logo h1 {
    font-size: 0.82rem;
    letter-spacing: 0.02em;
  }


  /* OCC navigation */

  .acs-nav {
    gap: 8px;
  }


  /* Public navigation */

  .acs-nav-buttons {
    gap: 6px;
  }


  /* Main content */

  .acs-main {
    padding-left: 10px;
    padding-right: 10px;
  }


  /* Prevents automatic Safari zoom */

  input,
  select,
  textarea {
    font-size: 16px;
  }


  /* Modals */

  .modal,
  .acs-modal,
  .dialog {
    width: calc(100vw - 20px);
    max-width: calc(100vw - 20px);
  }


  /* Footer stays on one line with horizontal touch scroll */

  .acs-footer {
    padding: 14px 10px;
    font-size: 0.70rem;
  }

  .acs-footer-separator {
    margin: 0 4px;
  }
}   
    
</style>
</head>

<body>
  
  <main class="acs-index">

    <img
      src="index_acs_occ_bg.jpg"
      alt="Aviation Capital Simulator ACS OCC"
      class="acs-bg"
    >

    <a
      class="acs-click-zone register-zone"
      href="register.html"
      aria-label="Register">
    </a>

    <a
      class="acs-click-zone login-zone"
      href="login.html"
      aria-label="Login">
    </a>

  </main>
</body>
</html>
