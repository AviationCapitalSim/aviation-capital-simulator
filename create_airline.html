<!-- ❗AQUIE EMPIEZA SCRIPT -->
     
<script>
     
const realAirlines = [
  "American Airlines","Delta Air Lines","Lufthansa","Emirates","Qatar Airways",
  "Turkish Airlines","Singapore Airlines","British Airways","United Airlines",
  "Air France","Iberia","LATAM","Avianca","Air Europa","Air Canada",
  "Aeroflot","Alaska Airlines","JetBlue","Southwest Airlines","EasyJet","Ryanair"
];

/* ============================================================
   🔒 SUBMIT LOCK (ANTI DUPLICATE)
   ============================================================ */
let isSubmittingAirline = false;

/* ============================================================
   UPDATE COUNTRIES
   ============================================================ */
async function updateCountries() {

  const simYear = window.ACS_SIM_YEAR;

  if (!simYear) {
    console.warn("⏳ simYear not ready yet");
    return;
  }

  const countrySelect = document.getElementById("country");
  const selectedRegion = document.getElementById("region").value;

  countrySelect.innerHTML = '<option value="">Select Country</option>';

  if (!selectedRegion) return;

  const available = ACS_CountryHistory
    .filter(c => 
        c.region === selectedRegion &&
        c.start <= simYear &&
        (c.end === null || c.end >= simYear)
    )
    .sort((a, b) => a.name.localeCompare(b.name));

  available.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.textContent = c.name;
    countrySelect.appendChild(opt);
  });

}
     
function generateUniqueCodes() {
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const random = (n) =>
    Array.from({ length: n }, () => letters[Math.floor(Math.random() * letters.length)]).join("");

  document.getElementById("iata").value = random(2);
  document.getElementById("icao").value = random(3);
}

/* ============================================================
   HANDLE AIRLINE CREATION (CLEAN)
   ============================================================ */

async function handleAirlineCreation(event) {
  event.preventDefault();

  // 🚫 BLOQUEO DOBLE SUBMIT
  if (isSubmittingAirline) {
    console.warn("🚫 Duplicate submit blocked");
    return false;
  }

  isSubmittingAirline = true;

  const user = await getActiveUser();

  if (!user) {
    isSubmittingAirline = false;
    alert("⚠ Session required. Please login.");
    window.location.href = "login.html";
    return false;
  }

  const airlineName = document.getElementById("airlineName").value.trim();
  const region = document.getElementById("region").value;
  const country = document.getElementById("country").value;
  const businessModel = document.getElementById("businessModel").value;
  const operationMode = document.getElementById("operationMode").value;
  const slogan = document.getElementById("slogan").value.trim();
  const icao = document.getElementById("icao").value.trim().toUpperCase();
  const iata = document.getElementById("iata").value.trim().toUpperCase();

  const normalizedName = airlineName.toLowerCase().replace(/[^a-z\s]/gi, "").trim();

  if (realAirlines.some(real => {
    const realNorm = real.toLowerCase().replace(/[^a-z\s]/gi, "").trim();
    return normalizedName.includes(realNorm) || realNorm.includes(normalizedName);
  })) {
    isSubmittingAirline = false;
    alert("⚠️ That airline name is too similar to a real-world airline.");
    return false;
  }

  const airline = {
    name: airlineName,
    icao,
    iata,
    slogan,
    region,
    country,
    businessModel,
    operationMode
  };

  const ACS_API_URL = "https://api.aviationcapitalsim.com/v1/airlines/create";

  try {

    const res = await fetch(ACS_API_URL, {
      method: "POST",
      credentials: "include",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        airline_name: airline.name,
        airline_iata: airline.iata,
        airline_icao: airline.icao,
        country,
        region,
        business_model: businessModel,
        operation_mode: operationMode
      })
    });

    const result = await res.json();

    if (!result.ok) {
      isSubmittingAirline = false;
      alert("❌ Server error: " + (result.error || "Unknown"));
      return false;
    }

    /* 🧹 CLEAN LEGACY CACHE */
    localStorage.removeItem("ACS_baseICAO");
    localStorage.removeItem("ACS_baseIATA");
    localStorage.removeItem("ACS_baseCity");
    localStorage.removeItem("ACS_baseName");
    localStorage.removeItem("ACS_baseCountry");
    localStorage.removeItem("ACS_baseContinent");
    localStorage.removeItem("ACS_baseReady");

    alert("✔ Airline synced with server!");
    window.location.href = "choose_base.html";

  } catch (err) {
    console.error("CREATE_AIRLINE ERROR:", err);
    isSubmittingAirline = false;
    alert("❌ Error connecting to ACS server: " + err.message);
  }

  return false;
}

/* ============================================================
   SESSION (BACKEND ONLY)
   ============================================================ */

async function getActiveUser(){

  try{
    const res = await fetch("https://api.aviationcapitalsim.com/v1/session", {
      credentials: "include"
    });

    const data = await res.json();

    if(!data.ok) return null;

    return data.user;

  }catch(err){
    console.error("SESSION ERROR:", err);
    return null;
  }
}

async function getSimYear(){

  try{
    const res = await fetch("https://api.aviationcapitalsim.com/v1/world", {
      credentials: "include"
    });

    const data = await res.json();

    const simStart =
      data?.world?.sim_start ||
      data?.sim_start ||
      null;

    if (!simStart) {
      console.error("WORLD PAYLOAD INVALID:", data);
      return null;
    }

    return new Date(simStart).getFullYear();

  }catch(err){
    console.error("WORLD FETCH ERROR:", err);
    return null;
  }

}

document.addEventListener("DOMContentLoaded", async () => {

  window.ACS_SIM_YEAR = await getSimYear();
  console.log("🌍 SIM YEAR:", window.ACS_SIM_YEAR);

  const user = await getActiveUser();

  if(!user){
    alert("⚠ Session required. Please login.");
    window.location.href = "login.html";
    return;
  }

  await updateCountries();

  const airlineInput = document.getElementById("airlineName");
  if (airlineInput) {
    airlineInput.addEventListener("input", generateUniqueCodes);
  }

  const regionSelect = document.getElementById("region");
  if (regionSelect) {
    regionSelect.addEventListener("change", async () => {
      await updateCountries();
    });
  }

});
