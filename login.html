  <div class="acs-modal">

      Enter your registered email and we will send you a temporary password.
    </p>

<script>
  
/* ============================================================
   === ACS LOGIN MODULE — RAILWAY SESSION AUTH =================
   === Version: v2.0 | Secure Cookie Architecture ==============
   ============================================================ */
  
// 🔄 API BASE (recomendado usar dominio principal si ya lo tienes)
const ACS_API_URL = "https://api.aviationcapitalsim.com/v1/auth/login";

/* ============================================================
   === HANDLE LOGIN ============================================
   ============================================================ */
  
async function handleLogin(event) {
  
  event.preventDefault();

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("⚠️ Please enter both email and password.");
    return false;
  }

  try {
    
  const response = await fetch(ACS_API_URL, {
  method: "POST",
  credentials: "include", // 🔥 CRÍTICO
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    email,
    password
  })
});
    
    const text = await response.text();
   
    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      alert("❌ Server returned invalid response:\n" + text);
      return false;
    }

// ============================================================
// 🔐 L-FRONT-1 — NUEVOS ESTADOS DE SEGURIDAD (BACKEND v2)
// ============================================================

if (result.status === "INVALID_CREDENTIALS") {
  alert("❌ Invalid email or password.");
  return false;
}

if (result.status === "ACCOUNT_LOCKED") {
  alert("🔒 Account locked due to multiple failed attempts.\nPlease wait 15 minutes before trying again.");
  return false;
}
    
    // === NO_USER ===
    
    if (result.status === "NO_USER") {
      alert("❌ This email is not registered.\nPlease create your account.");
      window.location.href = "register.html";
      return false;
    }

    // === WRONG_PASSWORD ===
    
    if (result.status === "WRONG_PASSWORD") {
      alert("❌ Incorrect password. Please try again.");
      return false;
    }

   /* ============================================================
   ✅ NO_AIRLINE — PRIMER LOGIN
   ============================================================ */
    
if (result.status === "NO_AIRLINE") {

  window.location.href = "create_airline.html";
  return false;
}
    
  // === HAS_AIRLINE ===
    
  if (result.status === "HAS_AIRLINE") {

  window.location.href = "dashboard.html";
  return false;
}
    
  } catch (err) {
    alert("❌ Login failed: " + err.message);
    return false;
  }
}
</script>
