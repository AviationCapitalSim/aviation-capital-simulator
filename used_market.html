<script>

/* ============================================================
   💰 ACS MONEY FORMATTER — FULL USD (NO M FORMAT)
   ============================================================ */

function ACS_formatUSD(value) {
  if (!Number.isFinite(value)) return "$0";

  return "$" + Math.round(value).toLocaleString("en-US");
}

     
function updateClockDisplay(simTime){
  const el = document.getElementById("acs-clock");
  if(!el) return;
  let d = simTime instanceof Date ? simTime : new Date();
  const day = String(d.getUTCDate()).padStart(2,"0");
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const month = months[d.getUTCMonth()];
  const year  = d.getUTCFullYear();
  const hh = String(d.getUTCHours()).padStart(2,"0");
  const mm = String(d.getUTCMinutes()).padStart(2,"0");
  el.textContent = `${hh}:${mm} — ${day} ${month} ${year}`;
}

document.addEventListener("DOMContentLoaded",()=>{
  if(typeof registerTimeListener==="function"){
    registerTimeListener(updateClockDisplay);
  } else updateClockDisplay();
});

function handleLogout(){
  window.location.href="login.html";
}

function closeInfoModal() {
  const m = document.getElementById("infoModal");
  if (m) m.style.display = "none";

/* ============================================================
   === USED MARKET MODALS — QATAR LUXURY PREMIUM (FIXED) =======
   ============================================================ */

let selectedUsedID = null;

/* ============================================================
   Helper — Obtener aeronave usada por ID
   ============================================================ */
     
function getUsedById(id) {
  const list = (typeof generateUsedMarket === "function")
    ? generateUsedMarket()
    : [];

  return list.find(ac => ac.id === id) || null;
}
     
/* ============================================================
   🟧 BUY USED MODAL — AIRBUS OCC / BACKEND AUTHORITY v1.0
   ------------------------------------------------------------
   Purpose:
   - Display used aircraft acquisition panel with OCC styling
   - Read company capital from backend only
   - Remove localStorage dependency
   - Show estimated delivery date from ACS clock
   - Show market gate status
   - Show maintenance advisory from backend/listing status only
   - Does NOT create fleet
   - Does NOT mutate Finance
   - Does NOT redirect to My Aircraft
   ============================================================ */

const ACS_USED_FINANCE_ENDPOINT =
  "https://api.aviationcapitalsim.com/v1/finance";

/* ============================================================
   Helper — Backend Finance Capital
   ============================================================ */

async function ACS_getBackendCompanyCapital() {
  try {
    const response = await fetch(ACS_USED_FINANCE_ENDPOINT, {
      method: "GET",
      credentials: "include",
      headers: {
        "Accept": "application/json"
      }
    });

    const data = await response.json().catch(() => null);

    if (!response.ok || !data) {
      throw new Error(data?.error || `FINANCE_HTTP_${response.status}`);
    }

    const candidates = [
      data.capital,
      data.finance?.capital,
      data.company_finance?.capital,
      data.companyFinance?.capital,
      data.account?.capital,
      data.airline?.capital
    ];

    for (const value of candidates) {
      const n = Number(value);
      if (Number.isFinite(n)) return n;
    }

    console.warn("⚠️ Finance payload received but capital field was not found:", data);
    return 0;

  } catch (error) {
    console.error("❌ Used Market capital backend load failed:", error);
    return 0;
  }
}

/* ============================================================
   Helper — ACS Current Date
   ============================================================ */

function ACS_getUsedMarketSimDate() {
  try {
    if (typeof ACS_TIME !== "undefined" && ACS_TIME.currentTime) {
      const d = new Date(ACS_TIME.currentTime);
      if (!Number.isNaN(d.getTime())) return d;
    }
  } catch (error) {
    console.warn("⚠️ Could not read ACS_TIME for Used Market:", error);
  }

  return new Date(Date.UTC(1940, 0, 1));
}

/* ============================================================
   Helper — Add ACS Days
   ============================================================ */

function ACS_addUsedMarketDays(date, days) {
  const base = date instanceof Date ? date : ACS_getUsedMarketSimDate();

  return new Date(
    base.getTime() + (Number(days || 0) * 24 * 60 * 60 * 1000)
  );
}

/* ============================================================
   Helper — Format ACS Date
   ============================================================ */

function ACS_formatUsedMarketDate(date) {
  const d = date instanceof Date ? date : new Date(date);

  if (Number.isNaN(d.getTime())) return "—";

  const day = String(d.getUTCDate()).padStart(2, "0");
  const months = [
    "JAN", "FEB", "MAR", "APR", "MAY", "JUN",
    "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"
  ];

  return `${day} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}

   ============================================================ */

function ACS_getUsedAircraftModalImage(ac) {
  if (!ac) return "img/placeholder_aircraft.png";

  const backendFile = String(
    ac.image_filename ||
    ac.image_file_name ||
    ac.imageFileName ||
    ""
  ).trim();

  if (backendFile) {
    if (
      backendFile.startsWith("http://") ||
      backendFile.startsWith("https://") ||
      backendFile.startsWith("img/")
    ) {
      return backendFile;
    }

    if (backendFile.includes("/")) {
      return backendFile;
    }

    const manufacturer = String(ac.manufacturer || "").trim();

    let folder = manufacturer.replace(/\s+/g, " ");

    if (manufacturer.toLowerCase() === "de havilland") {
      folder = "de_havilland";
    }

    return `img/${folder}/${backendFile}`;
  }

  if (typeof getAircraftImage === "function") {
    return getAircraftImage(ac);
  }

  return "img/placeholder_aircraft.png";
}

/* ============================================================
   Helper — Used Modal Image Fallback
   ------------------------------------------------------------
   If backend image path fails, try the existing Used Market
   image resolver before going to placeholder.
   ============================================================ */

function ACS_handleUsedModalImageFallback(img) {
  if (!img) return;

  const fallbackSrc = img.dataset.fallbackSrc || "";

  if (fallbackSrc && img.dataset.usedFallbackTried !== "1") {
    img.dataset.usedFallbackTried = "1";
    img.src = fallbackSrc;
    return;
  }

  if (typeof ACS_handleImageFallback === "function") {
    ACS_handleImageFallback(img);
    return;
  }

  img.onerror = null;
  img.src = "img/placeholder_aircraft.png";
}     

/* ============================================================
   Helper — Market Gate Display
   ------------------------------------------------------------
   Backend final rule later:
   - CLEAR
   - NEXT_DAY
   ============================================================ */

function ACS_getUsedMarketGate(ac) {
  const raw =
    ac?.market_gate ||
    ac?.marketGate ||
    ac?.purchase_gate ||
    ac?.used_market_gate ||
    "CLEAR";

  const gate = String(raw || "CLEAR").toUpperCase();

  if (
    gate === "NEXT_DAY" ||
    gate === "NEXT DAY" ||
    gate === "HOLD" ||
    gate === "BLOCKED"
  ) {
    return {
      code: "NEXT_DAY",
      label: "MARKET GATE: NEXT DAY",
      detail: "Used market cycle limit.",
      clear: false
    };
  }

  return {
    code: "CLEAR",
    label: "Market Gate: CLEAR",
    detail: "",
    clear: true
  };
}

/* ============================================================
   Helper — Maintenance Advisory
   ------------------------------------------------------------
   ACS OCC rule:
   - D-check due date is evaluated against ACS sim date.
   - C-check is evaluated against hours/cycles.
   - D-check overrides C-check.
   - Does not trust maintenance_status alone.
   ============================================================ */

function ACS_getUsedMaintenanceAdvisory(ac) {
  if (!ac) {
    return {
      code: "CLEAR",
      label: "CLEAR",
      detail: "",
      extensionDays: 0,
      checkboxLabel: "",
      hasOption: false
    };
  }

  const simDate = ACS_getUsedMarketSimDate();

  const statusText = String(
    ac.maintenance_status ||
    ac.maintenanceStatus ||
    ac.check_status ||
    ""
  ).toUpperCase();

  /* ============================================================
     D-CHECK OVERDUE — date based
     ============================================================ */

  const rawDDate =
    ac.d_check_due_date ||
    ac.dCheckDueDate ||
    ac.d_check_due ||
    null;

  const dCheckDate = rawDDate ? new Date(rawDDate) : null;

  const dCheckOverdue =
    ac.d_check_overdue === true ||
    ac.dCheckOverdue === true ||
    String(ac.d_check_status || "").toUpperCase() === "OVERDUE" ||
    String(ac.dCheckStatus || "").toUpperCase() === "OVERDUE" ||
    statusText.includes("D-CHECK OVERDUE") ||
    statusText.includes("D CHECK OVERDUE") ||
    statusText.includes("D_OVERDUE") ||
    (
      dCheckDate instanceof Date &&
      !Number.isNaN(dCheckDate.getTime()) &&
      dCheckDate.getTime() <= simDate.getTime()
    );

  /* ============================================================
     C-CHECK OVERDUE — hours / cycles based
     ============================================================ */

  const currentHours = Number(
    ac.hours ||
    ac.total_hours ||
    ac.totalHours ||
    0
  );

  const currentCycles = Number(
    ac.cycles ||
    ac.total_cycles ||
    ac.totalCycles ||
    0
  );

  const cDueHours = Number(
    ac.c_check_due_hours ||
    ac.cCheckDueHours ||
    0
  );

  const cDueCycles = Number(
    ac.c_check_due_cycles ||
    ac.cCheckDueCycles ||
    0
  );

  const cCheckOverdue =
    ac.c_check_overdue === true ||
    ac.cCheckOverdue === true ||
    String(ac.c_check_status || "").toUpperCase() === "OVERDUE" ||
    String(ac.cCheckStatus || "").toUpperCase() === "OVERDUE" ||
    statusText.includes("C-CHECK OVERDUE") ||
    statusText.includes("C CHECK OVERDUE") ||
    statusText.includes("C_OVERDUE") ||
    (
      cDueHours > 0 &&
      currentHours >= cDueHours
    ) ||
    (
      cDueCycles > 0 &&
      currentCycles >= cDueCycles
    );

  /* ============================================================
     D-CHECK has priority over C-CHECK
     ============================================================ */

  if (dCheckOverdue) {
    return {
      code: "D_OVERDUE",
      label: "🟥 D-Check Overdue",
      detail: "Aircraft will enter D-Check maintenance after acquisition.",
      extensionDays: 0,
      checkboxLabel: "",
      hasOption: false
    };
  }

  if (cCheckOverdue) {
    return {
      code: "C_OVERDUE",
      label: "⚠ C-Check Overdue",
      detail: "Aircraft will enter C-Check maintenance after acquisition.",
      extensionDays: 0,
      checkboxLabel: "",
      hasOption: false
    };
  }

  return {
    code: "CLEAR",
    label: "CLEAR",
    detail: "",
    extensionDays: 0,
    checkboxLabel: "",
    hasOption: false
  };
}

/* ============================================================
   Helper — Render BUY Used Modal Body
   ============================================================ */

function ACS_renderBuyUsedModalBody(ac, capital) {
  const detailsEl = document.getElementById("buyDetails");
  const confirmBtn = document.getElementById("confirmBuyBtn");

  if (!detailsEl || !confirmBtn || !ac) return;

  const price = Number(ac.price_acs_usd || 0);
  const enoughCapital = Number(capital || 0) >= price;

  const gate = ACS_getUsedMarketGate(ac);
  const advisory = ACS_getUsedMaintenanceAdvisory(ac);

  const baseDeliveryDate = ACS_addUsedMarketDays(
    ACS_getUsedMarketSimDate(),
    10
  );

  const revisedDeliveryDate = ACS_addUsedMarketDays(
    baseDeliveryDate,
    advisory.extensionDays
  );

  const maintenanceOptionHTML = advisory.hasOption
    ? `
      <div class="used-occ-maint-option">
        <label class="used-occ-checkbox-line">
          <input id="usedPreDeliveryMaintenance" type="checkbox">
          <span>${advisory.checkboxLabel}</span>
        </label>

        <div id="usedMaintenanceExtension"
             class="used-occ-extension"
             style="display:none;">
          Adds +${advisory.extensionDays} ACS days<br>
          Revised Delivery Date:
          <b>${ACS_formatUsedMarketDate(revisedDeliveryDate)}</b>
        </div>
      </div>
    `
    : "";

  const capitalStatusHTML = enoughCapital
    ? `<span class="used-occ-ok">Capital Available</span>`
    : `<span class="used-occ-danger">Insufficient Capital</span>`;

  const gateHTML = gate.clear
    ? `<span class="used-occ-chip used-occ-chip-clear">${gate.label}</span>`
    : `
      <span class="used-occ-chip used-occ-chip-hold">${gate.label}</span>
      <div class="used-occ-gate-detail">${gate.detail}</div>
    `;

  detailsEl.innerHTML = `
    <div class="used-occ-modal-grid">

      <div class="used-occ-image-wrap">
        <img
       class="used-occ-aircraft-img"
       src="${ACS_getUsedAircraftModalImage(ac)}"
       data-fallback-src="${typeof getAircraftImage === "function" ? getAircraftImage(ac) : "img/placeholder_aircraft.png"}"
       alt="${ac.manufacturer} ${ac.model}"
       onerror="ACS_handleUsedModalImageFallback(this)"
      />
      </div>

      <div class="used-occ-panel">
        <div class="used-occ-section-title">BROKER / ASSET</div>

        <div class="used-occ-line">
          <span>Broker</span>
          <b>${ac.source || ac.remarketing_agent || "Eagle Broker"}</b>
        </div>

        <div class="used-occ-line">
          <span>Year</span>
          <b>${ac.year || "—"}</b>
        </div>

        <div class="used-occ-line">
          <span>Condition</span>
          <b>${ac.condition || "—"}</b>
        </div>

        <div class="used-occ-line">
          <span>Hours</span>
          <b>${Number(ac.hours || 0).toLocaleString("en-US")}</b>
        </div>

        <div class="used-occ-line">
          <span>Cycles</span>
          <b>${Number(ac.cycles || 0).toLocaleString("en-US")}</b>
        </div>
      </div>

      <div class="used-occ-panel">
        <div class="used-occ-section-title">ACQUISITION</div>

        <div class="used-occ-line">
          <span>Price</span>
          <b>${ACS_formatUSD(price)}</b>
        </div>

        <div class="used-occ-line">
          <span>Company Capital</span>
          <b>${ACS_formatUSD(capital)}</b>
        </div>

        <div class="used-occ-line">
          <span>Status</span>
          <b>${capitalStatusHTML}</b>
        </div>

        <div class="used-occ-line">
          <span>Estimated Delivery Date</span>
          <b>${ACS_formatUsedMarketDate(baseDeliveryDate)}</b>
        </div>

        <div class="used-occ-gate-box">
          ${gateHTML}
        </div>
      </div>

      <div class="used-occ-panel used-occ-maint-panel">
        <div class="used-occ-section-title">MAINTENANCE ADVISORY</div>

        <div class="used-occ-maint-status ${
  advisory.code === "D_OVERDUE"
    ? "used-occ-maint-danger"
    : advisory.code === "C_OVERDUE"
      ? "used-occ-maint-warning"
      : ""
}">
  ${advisory.label}
</div>

${
  advisory.detail
    ? `<div class="used-occ-maint-detail">${advisory.detail}</div>`
    : ""
}

${maintenanceOptionHTML}
      </div>

    </div>
  `;

  const maintenanceCheckbox =
    document.getElementById("usedPreDeliveryMaintenance");

  if (maintenanceCheckbox) {
    maintenanceCheckbox.addEventListener("change", () => {
      const ext = document.getElementById("usedMaintenanceExtension");
      if (ext) {
        ext.style.display = maintenanceCheckbox.checked ? "block" : "none";
      }
    });
  }

  confirmBtn.disabled = true;
  confirmBtn.title =
    "Backend purchase authority pending. No frontend purchase execution.";

  confirmBtn.textContent = "Confirm Purchase";
}

/* ============================================================
   BUY MODAL — OPEN
   ============================================================ */

async function openBuyModal(id) {
  selectedUsedID = id;

  const ac = getUsedById(id);
  if (!ac) return;

  const titleEl = document.getElementById("buyTitle");
  const detailsEl = document.getElementById("buyDetails");
  const modalEl = document.getElementById("buyUsedModal");
  const confirmBtn = document.getElementById("confirmBuyBtn");

  if (!titleEl || !detailsEl || !modalEl || !confirmBtn) return;

  titleEl.textContent = `USED AIRCRAFT ACQUISITION`;
  confirmBtn.disabled = true;

  detailsEl.innerHTML = `
    <div class="used-occ-loading">
      Loading acquisition data...
    </div>
  `;

  modalEl.style.display = "flex";

  const capital = await ACS_getBackendCompanyCapital();

  ACS_renderBuyUsedModalBody(ac, capital);
}

/* ============================================================
   BUY MODAL — CLOSE
   ============================================================ */

function closeBuyModal() {
  const m = document.getElementById("buyUsedModal");
  if (m) m.style.display = "none";
}



/* ------------------- LEASE MODAL (SIN CAMBIOS) -------------- */

function openLeaseModal(id) {
  selectedUsedID = id;

  const ac = getUsedById(id);
  if (!ac) return;

  const titleEl = document.getElementById("leaseTitle");
  const detailsEl = document.getElementById("leaseDetails");
  const modalEl = document.getElementById("leaseUsedModal");

  const leaseMonth = Math.floor(ac.price_acs_usd * 0.015);

  titleEl.textContent = `Lease ${ac.manufacturer} ${ac.model}`;
  detailsEl.innerHTML = `
    <b>Monthly Lease:</b> $${leaseMonth.toLocaleString()}<br>
    <b>Term:</b> 12 months<br>
    <b>Condition:</b> ${ac.condition}<br>
    <b>Hours:</b> ${ac.hours.toLocaleString()}
  `;

  modalEl.style.display = "flex";
}

function closeLeaseModal() {
  const m = document.getElementById("leaseUsedModal");
  if (m) m.style.display = "none";
}


/* ============================================================
   🟧 USED MARKET CONFIRM BUTTONS — BACKEND AUTHORITY LOCK v1.0
   ------------------------------------------------------------
   Purpose:
   - Prevent false redirect to My Aircraft
   - Prevent frontend purchase/lease execution
   - Keep BUY / LEASE controlled until backend endpoints are ready
   ============================================================ */

(function(){
  const buyBtn = document.getElementById("confirmBuyBtn");

  if (buyBtn) {
    buyBtn.addEventListener("click", () => {
      console.warn(
        "⛔ BUY USED confirm blocked — backend purchase endpoint pending.",
        { selectedUsedID }
      );
    });
  }

  const leaseBtn = document.getElementById("confirmLeaseBtn");

  if (leaseBtn) {
    leaseBtn.addEventListener("click", () => {
      console.warn(
        "⛔ LEASE USED confirm blocked — backend lease endpoint pending.",
        { selectedUsedID }
      );
    });
  }
})();


/* ---------------- WIRE CARD BUTTONS -------------------------- */

function wireUsedMarketButtons() {
  const buyBtns = document.querySelectorAll(".ac-buy");
  buyBtns.forEach(btn => {
    if (btn.dataset.wired === "1") return;
    const attr = btn.getAttribute("onclick");
    let id = null;
    if (attr) {
      const match = attr.match(/buyUsed\('(.+)'\)/);
      if (match) id = match[1];
    }
    btn.removeAttribute("onclick");
    btn.dataset.wired = "1";
    btn.addEventListener("click", () => openBuyModal(id));
  });

  const leaseBtns = document.querySelectorAll(".ac-lease");
  leaseBtns.forEach(btn => {
    if (btn.dataset.wired === "1") return;
    const attr = btn.getAttribute("onclick");
    let id = null;
    if (attr) {
      const match = attr.match(/leaseUsed\('(.+)'\)/);
      if (match) id = match[1];
    }
    btn.removeAttribute("onclick");
    btn.dataset.wired = "1";
    btn.addEventListener("click", () => openLeaseModal(id));
  });
}

/* ---- Hook para recablear cada vez que se renderice market ---- */

(function(){
  if (typeof renderUsedMarket === "function") {
    const originalRender = renderUsedMarket;
    window.renderUsedMarket = function(filter) {
      originalRender(filter);
      wireUsedMarketButtons();
    };
  }
})();
